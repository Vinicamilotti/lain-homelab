env_file: ../.env

services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ${DATA_DIR}/jellyfin/config:/config
      - ${DATA_DIR}/jellyfin/cache:/cache
      - type: bind
        source: ${DATA_DIR}/multimedia/series
        target: /series
      - type: bind
        source: ${DATA_DIR}/multimedia/movies
        target: /movies
      - type: bind
        source: ${DATA_DIR}/multimedia/books
        target: /books
      - type: bind
        source: ${DATA_DIR}/multimedia/manga
        target: /manga
    restart: 'unless-stopped'
    labels:
      - io.portainer.accesscontrol.public

  
